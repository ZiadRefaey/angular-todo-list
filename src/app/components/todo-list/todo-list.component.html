<div class="flex items-center justify-between mb-10">
  <div>
    <h1 class="text-3xl font-bold">Today's Tasks</h1>
    <p class="text-muted">
      <span>{{ todoList.length }}</span> tasks remaining
    </p>
  </div>
  <a
    class="size-12 bg-primary hover:bg-primary-dark cursor-pointer transition-all duration-200 flex items-center justify-center rounded-xl text-lg"
    routerLink="add-todo"
    ><i class="pi pi-plus text-white"></i>
  </a>
</div>
<app-search-bar (searchOutput)="onSearch($event)"></app-search-bar>
<div class="flex flex-col items-center justify-center gap-4">
  @for (item of todoList; track item.id) {
    <app-todo-item
      (delete)="onDelete($event)"
      (check)="onCheck($event)"
      [todoInfo]="item"
    ></app-todo-item>
  }
</div>
