<div class="flex items-center justify-between mb-10">
  <div>
    <h1 class="text-3xl font-bold">Today's Tasks</h1>
    <p class="text-muted"><span>4</span> tasks remaining</p>
  </div>
  <a
    class="size-12 bg-primary hover:bg-primary-dark cursor-pointer transition-all duration-200 flex items-center justify-center rounded-xl text-lg"
    ><i class="pi pi-times text-white"></i>
  </a>
</div>

@for (item of todoList; track item.title) {
  <app-todo-item [todoInfo]="item"></app-todo-item>
}
