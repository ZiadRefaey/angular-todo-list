<div
  class="w-full rounded-xl bg-background-light border border-primary shadow-sm shadow-primary px-8 py-8 flex flex-col items-start justify-center gap-10"
  [ngClass]="{
    'opacity-50': todoInfo.isChecked,
  }"
>
  <div class="flex items-start justify-between w-full">
    <div>
      <p class="font-bold text-xl mb-2">{{ todoInfo.title }}</p>
      <p class="text-muted">Created at: {{ todoInfo.date | date: 'short' }}</p>
      <p class="text-lg text-white mt-10">{{ todoInfo.details }}</p>
    </div>
    <div
      class="border px-2 py-1 font-bold text-sm rounded-md"
      [ngClass]="{
        'border-success bg-success-dark text-success-light': todoInfo.priority === 'LOW',
        'border-primary-light bg-primary-dark text-primary': todoInfo.priority === 'MEDIUM',
        'border-danger bg-danger-dark text-danger-light': todoInfo.priority === 'HIGH',
      }"
    >
      {{ todoInfo.priority }}
    </div>
  </div>
  <div class="flex items-center justify-center self-end gap-4">
    <button
      (click)="deleteTodo(todoInfo.id)"
      class="border border-muted bg-muted-dark rounded-lg size-14 text-xl flex items-center justify-center cursor-pointer transition-all duration-200 hover:bg-danger-dark hover:border-danger hover:text-danger-light text-muted-light"
    >
      <i class="pi pi-trash"></i>
    </button>
    <button
      (click)="checkTodo()"
      class="border border-success bg-success-dark rounded-lg size-14 text-xl flex items-center justify-center cursor-pointer transition-all duration-200 text-success-light hover:text-white hover:bg-success-light"
      [ngClass]="{
        'bg-success-light text-white hover:bg-success-dark hover:text-success-light':
          todoInfo.isChecked,
      }"
    >
      <i class="pi pi-check"></i>
    </button>
  </div>
</div>
