<div
  class="w-full rounded-xl bg-background-light border border-primary shadow-sm shadow-primary px-8 py-8 flex flex-col items-start justify-center gap-10"
>
  <div class="flex items-start justify-between w-full">
    <div>
      <p class="font-bold text-xl mb-2">{{ todoInfo.title }}</p>
      <p class="text-muted">Created: {{ todoInfo.date | date }}</p>
    </div>
    <div
      class="border-danger border bg-danger-dark px-2 py-1 font-bold text-sm rounded-md text-danger-light"
    >
      HIGH
    </div>
  </div>
  <div class="flex items-center justify-center self-end gap-4">
    <button
      class="border border-primary-light bg-primary-dark rounded-lg size-14 text-xl flex items-center justify-center cursor-pointer hover:opacity-90 transition-all duration-200"
    >
      <i class="pi pi-pencil text-primary"></i>
    </button>
    <button
      class="border border-muted bg-muted-dark rounded-lg size-14 text-xl flex items-center justify-center cursor-pointer transition-all duration-200 hover:bg-danger-dark hover:border-danger hover:text-danger-light text-muted-light"
    >
      <i class="pi pi-trash"></i>
    </button>
    <button
      class="border border-success bg-success-dark rounded-lg size-14 text-xl flex items-center justify-center cursor-pointer transition-all duration-200 hover:opacity-90 text-success-light"
    >
      <i class="pi pi-check"></i>
    </button>
  </div>
</div>
